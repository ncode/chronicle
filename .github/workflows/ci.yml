name: ci
on:
  push:
  pull_request:

# OS coverage mirrors ncode/facts' release tier: native build+test on the
# GitHub-hosted OSes, a cross-compile sweep over the full matrix (agent: incl
# plan9; server: Postgres-capable, excl plan9). chronicle imports ncode/facts
# and ncode/facts-ca as normal module deps.

jobs:
  # Native build + vet + unit tests on the GitHub-hosted OS set.
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-13, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... # integration self-skips without CHRONICLE_TEST_DB

  # Full integration suite against a real Postgres (Linux only — GitHub service
  # containers require a Linux runner). Serialized (-p 1): the tests share one DB.
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chronicle_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      CHRONICLE_TEST_DB: postgres://postgres:postgres@localhost:5432/chronicle_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test -p 1 -timeout 120s ./...

  # Cross-compile both binaries for every supported OS/arch. The agent follows
  # facts' release tier (incl plan9); the server adds the Postgres-capable subset
  # (excl plan9). Build-only — these targets have no GitHub-hosted runners.
  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: cross-compile agent + server
        run: |
          set -e
          agent="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 \
                 freebsd/amd64 freebsd/arm freebsd/arm64 openbsd/amd64 openbsd/arm openbsd/arm64 \
                 netbsd/amd64 netbsd/arm netbsd/arm64 dragonfly/amd64 illumos/amd64 plan9/amd64"
          server="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64 \
                  freebsd/amd64 freebsd/arm freebsd/arm64 openbsd/amd64 openbsd/arm openbsd/arm64 \
                  netbsd/amd64 netbsd/arm netbsd/arm64 dragonfly/amd64 illumos/amd64"
          for t in $agent; do
            echo "agent  $t"
            CGO_ENABLED=0 GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null ./cmd/chronicle-agent
          done
          for t in $server; do
            echo "server $t"
            CGO_ENABLED=0 GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null ./cmd/chronicle
          done
